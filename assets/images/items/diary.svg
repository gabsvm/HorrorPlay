<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Book Cover Background (Deep Crimson Leather) -->
  <rect x="40" y="30" width="166" height="196" rx="12" fill="#450a0a" stroke="#1c1917" stroke-width="8"/>
  <!-- Spine details -->
  <rect x="40" y="30" width="26" height="196" rx="4" fill="#2d0606" stroke="#1c1917" stroke-width="4"/>
  <rect x="40" y="60" width="26" height="8" fill="#1c1917"/>
  <rect x="40" y="110" width="26" height="8" fill="#1c1917"/>
  <rect x="40" y="160" width="26" height="8" fill="#1c1917"/>
  
  <!-- Pages edge showing on right -->
  <path d="M206 42 L216 45 L216 211 L206 214 Z" fill="#fef08a" stroke="#1c1917" stroke-width="4"/>
  
  <!-- Corners (Brass protector brackets) -->
  <path d="M75 30 L66 30 L66 39 Z" fill="#ca8a04" stroke="#1c1917" stroke-width="2"/>
  <path d="M194 30 L206 30 L206 42 Z" fill="#ca8a04" stroke="#1c1917" stroke-width="2"/>
  <path d="M75 226 L66 226 L66 217 Z" fill="#ca8a04" stroke="#1c1917" stroke-width="2"/>
  <path d="M194 226 L206 226 L206 214 Z" fill="#ca8a04" stroke="#1c1917" stroke-width="2"/>
  
  <!-- Center Golden Sigil (Cthulhu Eye / Tentacles) -->
  <circle cx="136" cy="128" r="34" fill="#78350f" stroke="#ca8a04" stroke-width="4"/>
  <!-- Tentacles coming out of central circle -->
  <path d="M136 94 Q136 70 120 60 Q136 80 136 94" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round"/>
  <path d="M136 162 Q136 186 152 196 Q136 176 136 162" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round"/>
  <path d="M102 128 Q78 128 68 112 Q88 128 102 128" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round"/>
  <path d="M170 128 Q194 128 204 144 Q184 128 170 128" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round"/>
  <!-- Central creepy eye slit -->
  <ellipse cx="136" cy="128" rx="20" ry="10" fill="#eab308" stroke="#ca8a04" stroke-width="2"/>
  <line x1="136" y1="118" x2="136" y2="138" stroke="#000000" stroke-width="4"/>
</svg>
