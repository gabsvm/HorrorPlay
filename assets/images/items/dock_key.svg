<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Heavy Iron Dock Key - Ornate stout iron design with sea salt crust -->
  <g>
    <!-- Key Bow (Stout, heavy iron ring) -->
    <circle cx="128" cy="75" r="40" fill="#374151" stroke="#1f2937" stroke-width="8"/>
    <circle cx="128" cy="75" r="18" fill="#1e293b" stroke="#111827" stroke-width="4"/>
    
    <!-- Key Shaft (Thick iron cylinder) -->
    <rect x="120" y="115" width="16" height="95" fill="#374151" stroke="#1f2937" stroke-width="6"/>
    <rect x="114" y="135" width="28" height="10" fill="#4b5563" stroke="#1f2937" stroke-width="2"/>
    
    <!-- Heavy Key Bit (Large, rustic dock locking block) -->
    <path d="M136 175 L176 175 L176 210 L156 210 L156 195 L136 195 Z" fill="#374151" stroke="#1f2937" stroke-width="6"/>
    
    <!-- Sea Salt Encrustations (Light blue/white mineral deposits) -->
    <!-- Encrustations on the loop -->
    <circle cx="110" cy="50" r="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="106" cy="46" r="3" fill="#ffffff"/>
    <circle cx="150" cy="55" r="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="154" cy="58" r="4" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="152" cy="56" r="2" fill="#ffffff"/>
    <circle cx="95" cy="85" r="7" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="93" cy="83" r="4" fill="#ffffff"/>
    <circle cx="160" cy="90" r="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    
    <!-- Encrustations on the shaft and bit -->
    <circle cx="128" cy="150" r="4" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <circle cx="126" cy="148" r="2" fill="#ffffff"/>
    <circle cx="128" cy="185" r="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <circle cx="155" cy="185" r="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="153" cy="183" r="3" fill="#ffffff"/>
    <circle cx="165" cy="200" r="4" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  </g>
</svg>