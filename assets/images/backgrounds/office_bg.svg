<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="gritty-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" result="noise"/>
      <feColorMatrix type="matrix" values="
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0    0    0    0.24 0" in="noise" result="coloredNoise"/>
      <feComposite operator="over" in="coloredNoise" in2="SourceGraphic"/>
    </filter>
    
    <linearGradient id="wall-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="floor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="window-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#gritty-noise)">
    <!-- Solid Dark Wall Background -->
    <rect x="0" y="0" width="1920" height="1080" fill="url(#wall-grad)"/>
    
    <!-- Wooden Wall Panel Outlines -->
    <line x1="240" y1="0" x2="240" y2="800" stroke="#1e293b" stroke-width="4" stroke-dasharray="12, 12" opacity="0.3"/>
    <line x1="480" y1="0" x2="480" y2="800" stroke="#1e293b" stroke-width="4" stroke-dasharray="12, 12" opacity="0.3"/>
    <line x1="1440" y1="0" x2="1440" y2="800" stroke="#1e293b" stroke-width="4" stroke-dasharray="12, 12" opacity="0.3"/>
    <line x1="1680" y1="0" x2="1680" y2="800" stroke="#1e293b" stroke-width="4" stroke-dasharray="12, 12" opacity="0.3"/>
    
    <!-- Perspective Floor Planks -->
    <rect x="0" y="800" width="1920" height="280" fill="url(#floor-grad)"/>
    <!-- Floor grooves -->
    <line x1="0" y1="800" x2="1920" y2="800" stroke="#020617" stroke-width="8"/>
    <line x1="100" y1="800" x2="0" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    <line x1="400" y1="800" x2="200" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    <line x1="700" y1="800" x2="600" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    <line x1="1000" y1="800" x2="1000" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    <line x1="1300" y1="800" x2="1400" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    <line x1="1600" y1="800" x2="1800" y2="1080" stroke="#020617" stroke-width="4" opacity="0.6"/>
    
    <!-- Gothic Arch Window (Center background) -->
    <g transform="translate(150, 120)">
      <!-- Cyan Night glow outside -->
      <path d="M50 350 L50 150 A 100 150 0 0 1 250 150 L250 350 Z" fill="url(#window-glow)" opacity="0.4"/>
      <!-- Moon reflection -->
      <circle cx="150" cy="180" r="30" fill="#ccfbf1" opacity="0.65"/>
      <!-- Window Arched Frames -->
      <path d="M50 350 L50 150 A 100 150 0 0 1 250 150 L250 350 Z" fill="none" stroke="#090d16" stroke-width="12"/>
      <!-- Window divisions -->
      <line x1="150" y1="50" x2="150" y2="350" stroke="#090d16" stroke-width="6"/>
      <line x1="50" y1="230" x2="250" y2="230" stroke="#090d16" stroke-width="6"/>
      <!-- Rain effect outside (diagonal cyan lines) -->
      <line x1="80" y1="120" x2="60" y2="180" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
      <line x1="130" y1="110" x2="110" y2="170" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
      <line x1="190" y1="100" x2="170" y2="160" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
      <line x1="100" y1="240" x2="80" y2="300" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
      <line x1="170" y1="240" x2="150" y2="300" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
      <line x1="220" y1="210" x2="200" y2="270" stroke="#ecfeff" stroke-width="1.5" opacity="0.5"/>
    </g>
  </g>
</svg>
