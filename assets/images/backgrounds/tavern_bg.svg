<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="gritty-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" result="noise"/>
      <feColorMatrix type="matrix" values="
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0    0    0    0.24 0" in="noise" result="coloredNoise"/>
      <feComposite operator="over" in="coloredNoise" in2="SourceGraphic"/>
    </filter>
    
    <linearGradient id="wall-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#140b05"/>
      <stop offset="50%" stop-color="#24150a"/>
      <stop offset="100%" stop-color="#0c0703"/>
    </linearGradient>
    <linearGradient id="floor-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#361f10"/>
      <stop offset="100%" stop-color="#140b05"/>
    </linearGradient>
    <radialGradient id="fire-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#9a3412" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#140b05" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <g filter="url(#gritty-noise)">
    <!-- Solid Dark Warm Wall Background -->
    <rect x="0" y="0" width="1920" height="1080" fill="url(#wall-wood)"/>
    
    <!-- Wooden Wall Panel Pillars -->
    <rect x="180" y="0" width="40" height="800" fill="#0a0502" stroke="#000000" stroke-width="2"/>
    <rect x="680" y="0" width="40" height="800" fill="#0a0502" stroke="#000000" stroke-width="2"/>
    <rect x="1180" y="0" width="40" height="800" fill="#0a0502" stroke="#000000" stroke-width="2"/>
    <rect x="1680" y="0" width="40" height="800" fill="#0a0502" stroke="#000000" stroke-width="2"/>
    
    <!-- Perspective Floor Planks -->
    <rect x="0" y="800" width="1920" height="280" fill="url(#floor-wood)"/>
    <!-- Floor grooves/lines -->
    <line x1="0" y1="800" x2="1920" y2="800" stroke="#0c0703" stroke-width="8"/>
    <line x1="150" y1="800" x2="0" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>
    <line x1="450" y1="800" x2="250" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>
    <line x1="750" y1="800" x2="650" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>
    <line x1="1050" y1="800" x2="1050" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>
    <line x1="1350" y1="800" x2="1450" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>
    <line x1="1650" y1="800" x2="1850" y2="1080" stroke="#0c0703" stroke-width="4" opacity="0.6"/>

    <!-- Bar Shelves on the back wall -->
    <g opacity="0.85">
      <!-- Shelf 1 -->
      <rect x="300" y="250" width="300" height="12" fill="#361f10" stroke="#0c0703" stroke-width="2"/>
      <!-- Shelf 1 Bottles -->
      <rect x="330" y="190" width="16" height="60" rx="3" fill="#78350f" stroke="#0c0703" stroke-width="2"/>
      <rect x="350" y="200" width="14" height="50" rx="3" fill="#065f46" stroke="#0c0703" stroke-width="2"/>
      <rect x="370" y="180" width="18" height="70" rx="3" fill="#451a03" stroke="#0c0703" stroke-width="2"/>
      <rect x="420" y="195" width="15" height="55" rx="3" fill="#1e3a5f" stroke="#0c0703" stroke-width="2"/>
      <rect x="440" y="190" width="16" height="60" rx="3" fill="#78350f" stroke="#0c0703" stroke-width="2"/>
      <rect x="470" y="185" width="20" height="65" rx="3" fill="#14532d" stroke="#0c0703" stroke-width="2"/>

      <!-- Shelf 2 -->
      <rect x="300" y="420" width="300" height="12" fill="#361f10" stroke="#0c0703" stroke-width="2"/>
      <!-- Shelf 2 Bottles & Tankards -->
      <rect x="320" y="365" width="18" height="55" rx="2" fill="#7c2d12" stroke="#0c0703" stroke-width="2"/>
      <rect x="345" y="360" width="16" height="60" rx="3" fill="#15803d" stroke="#0c0703" stroke-width="2"/>
      <rect x="380" y="375" width="22" height="45" rx="4" fill="#a16207" stroke="#0c0703" stroke-width="2"/> <!-- Tankard -->
      <rect x="430" y="365" width="16" height="55" rx="2" fill="#0f766e" stroke="#0c0703" stroke-width="2"/>
      <rect x="455" y="360" width="20" height="60" rx="3" fill="#7c2d12" stroke="#0c0703" stroke-width="2"/>
      <rect x="480" y="375" width="22" height="45" rx="4" fill="#a16207" stroke="#0c0703" stroke-width="2"/> <!-- Tankard -->
    </g>

    <!-- Large Keg/Barrel on a stand (Right side) -->
    <g transform="translate(1350, 450)">
      <!-- Stand -->
      <polygon points="-40,150 40,150 20,250 -20,250" fill="#1c0d02" stroke="#0c0703" stroke-width="4"/>
      <polygon points="-80,250 -40,250 -60,350 -100,350" fill="#1c0d02" stroke="#0c0703" stroke-width="4"/>
      <polygon points="40,250 80,250 100,350 60,350" fill="#1c0d02" stroke="#0c0703" stroke-width="4"/>
      <!-- Barrel body -->
      <ellipse cx="0" cy="150" rx="100" ry="110" fill="#451a03" stroke="#0c0703" stroke-width="6"/>
      <ellipse cx="0" cy="150" rx="80" ry="90" fill="#2d1101" stroke="#0c0703" stroke-width="3"/>
      <!-- Metal bands -->
      <ellipse cx="0" cy="150" rx="90" ry="100" fill="none" stroke="#374151" stroke-width="8" opacity="0.4"/>
      <!-- Spigot/Tap -->
      <rect x="-10" y="210" width="20" height="30" fill="#b45309" stroke="#0c0703" stroke-width="3"/>
      <rect x="-20" y="230" width="40" height="12" fill="#ca8a04" stroke="#0c0703" stroke-width="2"/>
    </g>

    <!-- Cozy Brick Fireplace (Center Background) -->
    <g transform="translate(800, 350)">
      <!-- Fireplace structure -->
      <rect x="0" y="100" width="300" height="350" fill="#271c19" stroke="#0c0703" stroke-width="6" rx="4"/>
      <!-- Hearth Opening -->
      <path d="M 50 450 L 50 250 A 100 100 0 0 1 250 250 L 250 450 Z" fill="#0c0703" stroke="#1c1917" stroke-width="4"/>
      <!-- Mantlepiece -->
      <rect x="-20" y="80" width="340" height="25" fill="#1c0d02" stroke="#0c0703" stroke-width="4" rx="2"/>
      <!-- Chimney breast going up -->
      <rect x="30" y="-350" width="240" height="430" fill="#1f1513" stroke="#0c0703" stroke-width="4"/>
      <!-- Brick pattern lines (subtle) -->
      <line x1="30" y1="-250" x2="270" y2="-250" stroke="#0c0703" stroke-width="2" opacity="0.3"/>
      <line x1="30" y1="-150" x2="270" y2="-150" stroke="#0c0703" stroke-width="2" opacity="0.3"/>
      <line x1="30" y1="-50" x2="270" y2="-50" stroke="#0c0703" stroke-width="2" opacity="0.3"/>
      <line x1="30" y1="50" x2="270" y2="50" stroke="#0c0703" stroke-width="2" opacity="0.3"/>
      <line x1="30" y1="180" x2="270" y2="180" stroke="#0c0703" stroke-width="2" opacity="0.3"/>
      
      <!-- Glowing fire light backing -->
      <rect x="50" y="250" width="200" height="200" fill="url(#fire-glow)" opacity="0.95"/>
      
      <!-- Glowing embers/fire in hearth -->
      <circle cx="150" cy="400" r="45" fill="#ea580c" opacity="0.8"/>
      <polygon points="120,430 180,430 150,360" fill="#facc15" opacity="0.9"/>
      <polygon points="100,430 140,430 120,380" fill="#f97316" opacity="0.8"/>
      <polygon points="160,430 200,430 180,380" fill="#f97316" opacity="0.8"/>
      <!-- Cast iron grate -->
      <line x1="80" y1="440" x2="220" y2="440" stroke="#1c1917" stroke-width="8" stroke-linecap="round"/>
      <line x1="100" y1="410" x2="100" y2="440" stroke="#1c1917" stroke-width="4"/>
      <line x1="150" y1="410" x2="150" y2="440" stroke="#1c1917" stroke-width="4"/>
      <line x1="200" y1="410" x2="200" y2="440" stroke="#1c1917" stroke-width="4"/>
    </g>
  </g>
</svg>
