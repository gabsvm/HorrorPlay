<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <defs>
    <filter id="gritty-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" result="noise"/>
      <feColorMatrix type="matrix" values="
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0    0    0    0.24 0" in="noise" result="coloredNoise"/>
      <feComposite operator="over" in="coloredNoise" in2="SourceGraphic"/>
    </filter>
    
    <!-- Rich volumetric gradients for wood depth -->
    <linearGradient id="wood-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c2405"/>
      <stop offset="30%" stop-color="#451a03"/>
      <stop offset="100%" stop-color="#1f0e01"/>
    </linearGradient>
    <linearGradient id="wood-trim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f1a04"/>
      <stop offset="100%" stop-color="#1c0a01"/>
    </linearGradient>
    <linearGradient id="wood-legs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f0a01"/>
      <stop offset="50%" stop-color="#301302"/>
      <stop offset="100%" stop-color="#140600"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#gritty-noise)">
    <!-- Heavy wood legs/sides (Back depth shadow) -->
    <rect x="70" y="55" width="160" height="70" fill="#1f0c02" stroke="#100700" stroke-width="4"/>
    
    <!-- Left Leg -->
    <rect x="30" y="45" width="40" height="100" fill="url(#wood-legs)" stroke="#100700" stroke-width="4"/>
    <rect x="35" y="55" width="8" height="80" fill="#451a03" opacity="0.3"/> <!-- Highlights -->
    
    <!-- Right Leg -->
    <rect x="230" y="45" width="40" height="100" fill="url(#wood-legs)" stroke="#100700" stroke-width="4"/>
    <rect x="235" y="55" width="8" height="80" fill="#451a03" opacity="0.3"/> <!-- Highlights -->
    
    <!-- Solid wood top -->
    <rect x="10" y="15" width="280" height="30" rx="2" fill="url(#wood-top)" stroke="#100700" stroke-width="4"/>
    <!-- Decorative trim -->
    <rect x="20" y="41" width="260" height="10" fill="url(#wood-trim)" stroke="#100700" stroke-width="3"/>
    
    <!-- Highlights and scratches on desk surface to make it look old and used -->
    <line x1="20" y1="22" x2="260" y2="22" stroke="#853a07" stroke-width="2" opacity="0.4"/>
    <line x1="15" y1="28" x2="80" y2="28" stroke="#853a07" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="35" x2="48" y2="35" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
    <line x1="180" y1="25" x2="220" y2="25" stroke="#853a07" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Stack of old yellow papers on desk (catching warm candle light) -->
    <polygon points="120,10 155,9 152,17 117,18" fill="#eab308" stroke="#100700" stroke-width="2"/>
    <polygon points="123,8 151,7 153,15 125,16" fill="#fef08a"/>
    <!-- Ink spill stain -->
    <ellipse cx="140" cy="13" rx="6" ry="3" fill="#111827" opacity="0.75"/>
    <ellipse cx="143" cy="14" rx="2" ry="1" fill="#111827" opacity="0.75"/>
  </g>
</svg>
