<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 350" width="200" height="350">
  <defs>
    <filter id="gritty-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" result="noise"/>
      <feColorMatrix type="matrix" values="
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0.21 0.21 0.21 0 0
        0    0    0    0.24 0" in="noise" result="coloredNoise"/>
      <feComposite operator="over" in="coloredNoise" in2="SourceGraphic"/>
    </filter>
    
    <linearGradient id="door-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="door-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c2405"/>
      <stop offset="50%" stop-color="#3b1502"/>
      <stop offset="100%" stop-color="#140600"/>
    </linearGradient>
    <linearGradient id="iron-strap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#gritty-noise)">
    <!-- Gothic Arched door frame -->
    <path d="M10 340 L10 120 A 90 120 0 0 1 190 120 L190 340 Z" fill="url(#door-frame)" stroke="#0f172a" stroke-width="8"/>
    
    <!-- Inner wood door panel -->
    <path d="M22 338 L22 125 A 80 110 0 0 1 178 125 L178 338 Z" fill="url(#door-wood)" stroke="#0f172a" stroke-width="4"/>
    
    <!-- Vertical wood panel lines -->
    <line x1="60" y1="125" x2="60" y2="338" stroke="#100700" stroke-width="3"/>
    <line x1="100" y1="46" x2="100" y2="338" stroke="#100700" stroke-width="3"/>
    <line x1="140" y1="125" x2="140" y2="338" stroke="#100700" stroke-width="3"/>
    
    <!-- Iron straps (gothic styling reinforcements) -->
    <!-- Top Strap -->
    <rect x="22" y="160" width="156" height="14" fill="url(#iron-strap)" stroke="#0f172a" stroke-width="2"/>
    <circle cx="40" cy="167" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    <circle cx="100" cy="167" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    <circle cx="160" cy="167" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    
    <!-- Bottom Strap -->
    <rect x="22" y="270" width="156" height="14" fill="url(#iron-strap)" stroke="#0f172a" stroke-width="2"/>
    <circle cx="40" cy="277" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    <circle cx="100" cy="277" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    <circle cx="160" cy="277" r="3" fill="#94a3b8" stroke="#0f172a" stroke-width="1"/>
    
    <!-- Heavy iron gothic handle -->
    <rect x="155" y="195" width="10" height="45" fill="#1e293b" stroke="#0f172a" stroke-width="2.5" rx="2"/>
    <circle cx="160" cy="200" r="3.5" fill="#475569" stroke="#0f172a" stroke-width="1"/>
    <circle cx="160" cy="235" r="3.5" fill="#475569" stroke="#0f172a" stroke-width="1"/>
    <path d="M 160 205 L 140 212 L 140 223 L 160 230" fill="none" stroke="url(#iron-strap)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 160 205 L 140 212 L 140 223 L 160 230" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
